env:
  NODE_ENV: test
name: Full CI/CD Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # FRONTEND
    - name: Install frontend dependencies
      run: |
        cd client
        npm ci

    - name: Build frontend
      run: |
        cd client
        npm run build

    # BACKEND
    - name: Install backend dependencies
      run: |
        cd server
        npm ci

    - name: Run backend tests
      run: |
        cd server
        npm test

    # DEPLOY
    - name: Deploy Application
      run: echo "Deployment successful 🚀"
    - name: Deploy to Local Server
      run: echo "Trigger deployment"